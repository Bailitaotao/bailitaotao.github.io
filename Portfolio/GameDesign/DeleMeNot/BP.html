<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE5 蓝图脚本展示</title>
    
    <!-- 引入主样式文件 -->
    <link rel="stylesheet" href="../../../assets/styles.css">
    
    <style>
        /* 基于现有CSS变量的自定义样式 */
        body {
            margin: 0;
            padding: var(--mb-2);
            font-family: var(--body-font);
            background-color: var(--body-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        .blueprint-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section__title {
            font-size: var(--h1-font-size);
            color: var(--title-color);
            text-align: center;
            margin-bottom: var(--mb-2);
            font-weight: var(--font-semi-bold);
        }

        .blueprint-viewer {
            background-color: var(--container-color);
            border-radius: .5rem;
            padding: var(--mb-2);
            box-shadow: 0 4px 25px hsla(var(--hue-color), 70%, 58%, .15);
            border: 1px solid var(--first-color-lighter);
            margin-bottom: var(--mb-2);
        }

        .viewer-container {
            position: relative;
            width: 100%;
            height: 600px;
            border: 3px solid var(--first-color);
            border-radius: .5rem;
            overflow: hidden;
            background-color: var(--input-color);
            cursor: grab;
            user-select: none;
        }

        .viewer-container:active {
            cursor: grabbing;
        }

        .blueprint-image {
            position: absolute;
            transition: none;
            cursor: grab;
            max-width: none;
            height: auto;
        }

        .blueprint-image:active {
            cursor: grabbing;
        }

        .controls {
            margin-top: var(--mb-1);
            text-align: center;
        }

        .control-btn {
            background-color: var(--first-color);
            color: #FFFF;
            border: none;
            padding: .75rem 1rem;
            margin: 0 var(--mb-0-25);
            border-radius: .5rem;
            cursor: pointer;
            font-size: var(--small-font-size);
            font-weight: var(--font-medium);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .control-btn:hover {
            background-color: var(--first-color-alt);
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .info-panel {
            margin-top: var(--mb-1-5);
            background-color: var(--container-color);
            padding: var(--mb-1-5);
            border-radius: .5rem;
            border-left: 4px solid var(--first-color);
        }

        .info-panel h3 {
            color: var(--title-color);
            font-size: var(--h3-font-size);
            font-weight: var(--font-semi-bold);
            margin-bottom: var(--mb-1);
        }

        .info-panel p {
            color: var(--text-color);
            font-size: var(--normal-font-size);
            margin-bottom: var(--mb-0-75);
        }

        .info-panel ul {
            list-style: none;
            padding-left: 0;
        }

        .info-panel li {
            color: var(--text-color);
            font-size: var(--normal-font-size);
            margin-bottom: var(--mb-0-25);
        }

        .zoom-info {
            position: absolute;
            top: var(--mb-0-5);
            right: var(--mb-0-5);
            background-color: var(--title-color);
            color: var(--body-color);
            padding: var(--mb-0-25) var(--mb-0-5);
            border-radius: .25rem;
            font-size: var(--smaller-font-size);
            font-weight: var(--font-medium);
        }

        .instructions {
            text-align: center;
            margin-bottom: var(--mb-1-5);
            color: var(--text-color-light);
        }

        .instructions p {
            margin: var(--mb-0-25) 0;
            font-size: var(--normal-font-size);
        }

        .instructions strong {
            color: var(--title-color);
            font-weight: var(--font-semi-bold);
        }

        /* 主题切换支持 */
        .change-theme {
            position: fixed;
            top: var(--mb-1);
            right: var(--mb-1);
            font-size: 1.25rem;
            color: var(--title-color);
            cursor: pointer;
            transition: .3s;
            z-index: var(--z-tooltip);
        }

        .change-theme:hover {
            color: var(--first-color);
        }

        /* 响应式设计 */
        @media screen and (max-width: 768px) {
            .blueprint-container {
                margin-left: var(--mb-1);
                margin-right: var(--mb-1);
            }
            
            .viewer-container {
                height: 400px;
            }
            
            .controls {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: var(--mb-0-25);
            }
            
            .control-btn {
                flex: 1;
                min-width: 120px;
                max-width: 150px;
            }
        }

        @media screen and (max-width: 350px) {
            .blueprint-container {
                margin-left: var(--mb-0-5);
                margin-right: var(--mb-0-5);
            }
            
            .control-btn {
                padding: .5rem .75rem;
                font-size: var(--smaller-font-size);
            }
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <i class="uil uil-moon change-theme" id="theme-button"></i>

    <div class="blueprint-container">
        <h1 class="section__title">🎮 UE5 蓝图脚本展示</h1>
        
        <div class="instructions">
            <p>💡 <strong>操作指南：</strong></p>
            <p>🖱️ 拖动图片进行移动 | 🔍 滚轮缩放 | 🔄 双击重置位置</p>
        </div>

        <div class="blueprint-viewer">
            <div class="viewer-container" id="viewerContainer">
                <img src="../../../assets/images/BP_1.png" 
                     alt="UE5 蓝图脚本" 
                     class="blueprint-image" 
                     id="blueprintImage">
                <div class="zoom-info" id="zoomInfo">缩放: 100%</div>
            </div>
            
            <div class="controls">
                <button class="control-btn button" onclick="zoomIn()">🔍 放大</button>
                <button class="control-btn button" onclick="zoomOut()">🔍 缩小</button>
                <button class="control-btn button" onclick="resetView()">🔄 重置视图</button>
                <button class="control-btn button" onclick="fitToContainer()">📐 适应窗口</button>
            </div>
            
            <div class="info-panel">
                <h3>📋 蓝图说明</h3>
                <p>这是一个UE5蓝图脚本的展示。你可以通过拖动来查看蓝图的不同部分，使用滚轮进行缩放操作。</p>
                <ul>
                    <li>🎯 支持无限制拖动和缩放</li>
                    <li>🔧 精确的鼠标控制</li>
                    <li>📱 响应式设计，支持各种屏幕尺寸</li>
                    <li>🌙 支持明暗主题切换</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        /*==================== 主题切换功能 ====================*/
        const themeButton = document.getElementById('theme-button')
        const darkTheme = 'dark-theme'
        const iconTheme = 'uil-sun'

        // Previously selected topic (if user selected)
        const selectedTheme = localStorage.getItem('selected-theme')
        const selectedIcon = localStorage.getItem('selected-icon')

        // We obtain the current theme that the interface has by validating the dark-theme class
        const getCurrentTheme = () => document.body.classList.contains(darkTheme) ? 'dark' : 'light'
        const getCurrentIcon = () => themeButton.classList.contains(iconTheme) ? 'uil-moon' : 'uil-sun'

        // We validate if the user previously chose a topic
        if (selectedTheme) {
            // If the validation is fulfilled, we ask what the issue was to know if we activated or deactivated the dark
            document.body.classList[selectedTheme === 'dark' ? 'add' : 'remove'](darkTheme)
            themeButton.classList[selectedIcon === 'uil-moon' ? 'add' : 'remove'](iconTheme)
        }

        // Activate / deactivate the theme manually with the button
        themeButton.addEventListener('click', () => {
            // Add or remove the dark / icon theme
            document.body.classList.toggle(darkTheme)
            themeButton.classList.toggle(iconTheme)
            // We save the theme and the current icon that the user chose
            localStorage.setItem('selected-theme', getCurrentTheme())
            localStorage.setItem('selected-icon', getCurrentIcon())
        })

        /*==================== 蓝图查看器功能 ====================*/
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let scale = 1;
        let initialScale = 1;
        
        const image = document.getElementById('blueprintImage');
        const container = document.getElementById('viewerContainer');
        const zoomInfo = document.getElementById('zoomInfo');

        // 图片加载完成后设置初始状态
        image.onload = function() {
            fitToContainer();
        };

        // 鼠标按下事件
        container.addEventListener('mousedown', function(e) {
            isDragging = true;
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
            container.style.cursor = 'grabbing';
            e.preventDefault();
        });

        // 鼠标移动事件
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            
            updateImagePosition();
        });

        // 鼠标释放事件
        document.addEventListener('mouseup', function() {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // 滚轮缩放事件
        container.addEventListener('wheel', function(e) {
            e.preventDefault();
            
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const deltaScale = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(0.1, Math.min(5, scale * deltaScale));
            
            if (newScale !== scale) {
                // 以鼠标位置为中心进行缩放
                const scaleChange = newScale / scale;
                currentX = mouseX - (mouseX - currentX) * scaleChange;
                currentY = mouseY - (mouseY - currentY) * scaleChange;
                
                scale = newScale;
                updateImagePosition();
                updateZoomInfo();
            }
        });

        // 双击重置
        container.addEventListener('dblclick', function() {
            resetView();
        });

        // 更新图片位置和缩放
        function updateImagePosition() {
            image.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
        }

        // 更新缩放信息
        function updateZoomInfo() {
            zoomInfo.textContent = `缩放: ${Math.round(scale * 100)}%`;
        }

        // 放大
        function zoomIn() {
            scale = Math.min(5, scale * 1.2);
            updateImagePosition();
            updateZoomInfo();
        }

        // 缩小
        function zoomOut() {
            scale = Math.max(0.1, scale / 1.2);
            updateImagePosition();
            updateZoomInfo();
        }

        // 重置视图
        function resetView() {
            currentX = 0;
            currentY = 0;
            scale = initialScale;
            updateImagePosition();
            updateZoomInfo();
        }

        // 适应容器
        function fitToContainer() {
            const containerRect = container.getBoundingClientRect();
            const imageRect = image.getBoundingClientRect();
            
            const scaleX = (containerRect.width * 0.9) / image.naturalWidth;
            const scaleY = (containerRect.height * 0.9) / image.naturalHeight;
            
            scale = Math.min(scaleX, scaleY, 1);
            initialScale = scale;
            
            // 居中显示
            currentX = (containerRect.width - image.naturalWidth * scale) / 2;
            currentY = (containerRect.height - image.naturalHeight * scale) / 2;
            
            updateImagePosition();
            updateZoomInfo();
        }

        // 防止图片拖拽的默认行为
        image.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        // 初始化
        updateZoomInfo();
    </script>

    <!-- Unicons 图标库 (用于主题切换图标) -->
    <script src="https://unicons.iconscout.com/release/v4.0.0/script/monochrome/bundle.js"></script>
</body>
</html>
