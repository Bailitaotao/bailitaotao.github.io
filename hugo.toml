baseURL = "http://example.org/"

# 更改使用 Hugo 构建网站时使用的默认主题
theme = "LoveIt"

# 网站标题
title = "陶昊洋的个人网站"

# 网站语言, 仅在这里 CN 大写 ["en", "zh-CN", "fr", "pl", ...]
languageCode = "zh-CN"

# 语言名称 ["English", "简体中文", "Français", "Polski", ...]
languageName = "简体中文"

# 是否包括中日韩文字
hasCJKLanguage = true

# 版权描述，仅仅用于 SEO
copyright = ""

# 是否使用 git 信息
enableGitInfo = true

# 菜单配置
[menu]
[[menu.main]]
weight = 1
identifier = "posts"
# 你可以在名称 (允许 HTML 格式) 之前添加其他信息, 例如图标
pre = ""
# 你可以在名称 (允许 HTML 格式) 之后添加其他信息, 例如图标
post = ""
name = "文章"
url = "/posts/"
# 当你将鼠标悬停在此菜单链接上时, 将显示的标题
title = "一些小作文"
[[menu.main]]
weight = 2
identifier = "gamedesign"
pre = ""
post = ""
name = "游戏设计"
url = "/game-design/"
title = "第九艺术"
[[menu.main]]
weight = 3
identifier = "photography"
pre = ""
post = ""
name = "摄影"
url = "/photography/"
title = "孤独的时光"
[[menu.main]]
weight = 4
identifier = "notes"
pre = ""
post = ""
name = "笔记"
url = "/notes/"
title = "没用的知识"

[params]
# 网站默认主题样式 ["auto", "light", "dark"]
defaultTheme = "auto"
# 公共 git 仓库路径，仅在 enableGitInfo 设为 true 时有效
gitRepo = "git clone https://github.com/Bailitaotao/bailitaotao.github.io.git"

# 作者配置
[params.author]
name = "陶昊洋"
email = "thy20030626@gmail.com"
link = "https://bailitaotao.com"

# 页面头部导航栏配置
[params.header]
# 桌面端导航栏模式 ["fixed", "normal", "auto"]
desktopMode = "fixed"
# 移动端导航栏模式 ["fixed", "normal", "auto"]
mobileMode = "auto"
# LoveIt 新增 | 0.2.0 页面头部导航栏标题配置
[params.header.title]
# LOGO 的 URL
logo = ""
# 标题名称
name = "百里陶陶"
# 你可以在名称 (允许 HTML 格式) 之前添加其他信息, 例如图标
pre = ""
# 你可以在名称 (允许 HTML 格式) 之后添加其他信息, 例如图标
post = ""
# LoveIt 新增 | 0.2.5 是否为标题显示打字机动画
typeit = false

# 页面底部信息配置
[params.footer]
enable = true
# LoveIt 新增 | 0.2.0 自定义内容 (支持 HTML 格式)
custom = '≡^⦁⩊⦁^≡'
# LoveIt 新增 | 0.2.0 是否显示 Hugo 和主题信息
hugo = false
# LoveIt 新增 | 0.2.0 是否显示版权信息
copyright = true
# LoveIt 新增 | 0.2.0 是否显示作者
author = true
# 网站创立年份
since = 2025
# ICP 备案信息，仅在中国使用 (支持 HTML 格式)
icp = ""
# 许可协议信息 (支持 HTML 格式)
license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

# 主页配置
[params.home]
# LoveIt 新增 | 0.2.0 RSS 文章数目
rss = 10
# 主页个人信息
[params.home.profile]
enable = true
# 主页显示头像的 URL
avatarURL = "/images/avatar-2d.jpeg"
# LoveIt 更改 | 0.2.7 主页显示的网站标题 (支持 HTML 格式)
title = "陶昊洋"
# 主页显示的网站副标题 (允许 HTML 格式)
subtitle = "游戏设计师 | 摄影师 | 书法家 | 电子工程师"
# 是否为副标题显示打字机动画
typeit = true
# 是否显示社交账号
social = true
# LoveIt 新增 | 0.2.0 免责声明 (支持 HTML 格式)
disclaimer = "₊⁺꒰ঌ (̳^_  ̫ _ ^ ̳)໒꒱₊⁺"
# 主页文章列表
[params.home.posts]
enable = true
# 主页每页显示文章数量
paginate = 6
# LoveIt 删除 | 0.2.0 被 params.page 中的 hiddenFromHomePage 替代
# 当你没有在文章前置参数中设置 "hiddenFromHomePage" 时的默认行为
defaultHiddenFromHomePage = false

# 作者的社交信息设置
[params.social]
GitHub = "https://github.com/Bailitaotao"
Linkedin = ""          # LoveIt 新增 | 0.3.1
Instagram = "xxxx"
Facebook = "xxxx"
Telegram = "xxxx"
Youtubechannel = "https://www.youtube.com/@Bailitaotao"
Bilibili = "https://space.bilibili.com/325680073"
TikTok = ""             # LoveIt 新增 | 0.3.0
Email = "thy20030626@gmail.com"
